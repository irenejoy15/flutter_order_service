# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: irenejoy21testapp
# "service" is the name of this project. This will also be added to your AWS resource names.
service: orderService

provider:
  name: aws
  # STEP 1
  runtime: nodejs24.x
  # STEP 2
  environment:
    DYNAMODB_TABLE: Orders
  # END STEP 2
  # STEP 3
  iamRoleStatements:
    - Effect: 'Allow'
      Action:
        - 'dynamodb:PutItem'
      Resource: 
        - Fn::GetAtt: [OrderTable, Arn]
  # END STEP 3
resources:
  Resources:
    OrderTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Orders
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S #string
        KeySchema:
          - AttributeName: id
            KeyType: HASH #partition key
  # END STEP 1

functions:
# STEP 2
  placeOrder:
    handler: handlers/placeOrder.placeOrder
    events:
      - httpApi:
          path: /place-order
          method: post
# END STEP 2