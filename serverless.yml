# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: irenejoy21testapp
# "service" is the name of this project. This will also be added to your AWS resource names.
service: orderService

provider:
  name: aws
  # STEP 1
  runtime: nodejs24.x
  # STEP 10 
  httpApi:
    authorizers:
      myCognitoAuth:
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_W60RMNZ1Y
        audience: 
          - 75gmpfq557c7khpelrdmdgpgh6
        
  # END STEP 10
  # STEP 2
  environment:
    DYNAMODB_TABLE: Orders
    # STEP 4
    SQS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/660880134927/OrdersQueue
    # END STEP 4
  # END STEP 2
  # STEP 3
  iamRoleStatements:
    - Effect: 'Allow'
      Action:
        - 'dynamodb:PutItem'
        # STEP 5
        - 'sqs:SendMessage'
        - 'sqs:ReceiveMessage'
        - 'sqs:DeleteMessage'
        # STEP 9
        - 'ses:SendEmail'
        - 'ses:SendRawEmail'
        # END STEP 9
        # END STEP 5
      Resource: 
        - Fn::GetAtt: [OrderTable, Arn]
        # STEP 5
        - Fn::GetAtt: [OrdersQueue, Arn]
        # END STEP 5
        # STEP 9
        - arn:aws:ses:us-east-1:660880134927:identity/irenejoy15@gmail.com
        # END STEP 9
  # END STEP 3
resources:
  Resources:
    OrderTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Orders
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S #string
        KeySchema:
          - AttributeName: id
            KeyType: HASH #partition key
  # END STEP 1
  # STEP 4
    OrdersQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: OrdersQueue
  # END STEP 4
  # STEP 8
    OrderServiceEmailIdentity:
      Type: AWS::SES::EmailIdentity
      Properties:
        EmailIdentity: irenejoy15@gmail.com
  # END STEP 8

functions:
# STEP 2
  placeOrder:
    handler: handlers/placeOrder.placeOrder
    events:
      - httpApi:
          path: /place-order
          method: post
      # STEP 10 - Add Cognito Authorizer to the API endpoint
          authorizer: 
            name: myCognitoAuth
      # END STEP 10
# END STEP 2
# STEP 6
  processOrder:
    handler: handlers/processOrder.processOrder
    events:
      - sqs:
          arn: 
            Fn::GetAtt: [OrdersQueue, Arn]
# END STEP 6